# The byte-identity replay gate — one of the two M1 branch-protected CI checks.
#
# Locked by docs/mirror_loop_m1_synthesis.md ("Gates (both CI-blocking):
# byte-identity replay under seed 42") and docs/adr/0001-m1-locks.md. The job
# id ('byte-identity-replay') is the literal status-check name a repo admin
# pastes into branch protection's "Require status checks to pass" list — see
# docs/CI.md.
#
# What this job runs is defined once in ci/gates.py (BYTE_IDENTITY_REPLAY).
# The runner ('python -m ci.byte_identity_replay') is the same command a
# developer runs locally to reproduce a red gate, and the same command
# ci/dry_run.py drives when verifying the gate flips red under a deliberate
# determinism break. That single source of truth is why the YAML here is
# thin.
name: byte-identity-replay

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so a flurry of pushes does not queue
# stale checks against branch protection. The gate is deterministic, so a
# cancelled run carries no information a fresh run will not also carry.
concurrency:
  group: byte-identity-replay-${{ github.ref }}
  cancel-in-progress: true

# Read-only token: this job never writes to the repo.
permissions:
  contents: read

jobs:
  byte-identity-replay:
    name: byte-identity-replay
    runs-on: ubuntu-latest
    steps:
      - name: Check out the commit under test
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Matches pyproject.toml requires-python lower bound. The runtime
          # is stdlib-only, so the minor version only matters for test
          # reproducibility, not for behavior under test.
          python-version: '3.11'

      - name: Install the project (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run the byte-identity replay gate
        # Single source of truth: ci/gates.py BYTE_IDENTITY_REPLAY.
        # Exits non-zero on the first failing step (pytest selection, then
        # `python -m game.replay --check`), which surfaces a red required
        # check on this commit.
        run: python -m ci.byte_identity_replay
